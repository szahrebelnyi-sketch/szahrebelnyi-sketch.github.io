<svg width="1080" height="1080" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Instagram banner – ZD Digital & AI Creator</title>
  <desc>First Instagram feed post for a digital and AI creator specializing in systematic design with meaning</desc>
  <defs>
    <clipPath id="circleClip">
      <circle cx="510" cy="370" r="195"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="680" height="680" fill="#0a0a0a"/>

  <!-- Green accent grid lines -->
  <line x1="0" y1="226" x2="680" y2="226" stroke="#038C3E" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="454" x2="680" y2="454" stroke="#038C3E" stroke-width="0.5" opacity="0.3"/>
  <line x1="226" y1="0" x2="226" y2="680" stroke="#038C3E" stroke-width="0.5" opacity="0.3"/>
  <line x1="452" y1="0" x2="452" y2="680" stroke="#038C3E" stroke-width="0.5" opacity="0.3"/>

  <!-- Large decorative circle outline -->
  <circle cx="510" cy="370" r="195" fill="none" stroke="#038C3E" stroke-width="1" opacity="0.25"/>
  <circle cx="510" cy="370" r="160" fill="none" stroke="#038C3E" stroke-width="0.5" opacity="0.15"/>

  <!-- Portrait image embedded -->
  <image href="portrait_pro_site.png" x="310" y="140" width="380" height="400" clip-path="url(#circleClip)" preserveAspectRatio="xMidYMid slice" opacity="0.92"/>

  <!-- Tag line at top -->
  <rect x="40" y="48" width="160" height="24" rx="12" fill="#038C3E" opacity="0.15"/>
  <rect x="40" y="48" width="160" height="24" rx="12" fill="none" stroke="#038C3E" stroke-width="0.75"/>
  <text x="120" y="65" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#038C3E" letter-spacing="1.5">DIGITAL CREATOR</text>

  <!-- Main heading -->
  <text x="40" y="138" font-family="sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">Дизайн</text>
  <text x="40" y="196" font-family="sans-serif" font-size="52" font-weight="700" fill="#038C3E" letter-spacing="-1">со смыслом.</text>

  <!-- Subheading -->
  <text x="40" y="248" font-family="sans-serif" font-size="14" font-weight="400" fill="#888888" letter-spacing="0.3">Системный подход к визуальным</text>
  <text x="40" y="268" font-family="sans-serif" font-size="14" font-weight="400" fill="#888888" letter-spacing="0.3">коммуникациям и AI-инструментам</text>

  <!-- Divider -->
  <line x1="40" y1="296" x2="200" y2="296" stroke="#038C3E" stroke-width="1.5"/>
  <circle cx="200" cy="296" r="3" fill="#038C3E"/>

  <!-- Three pillars -->
  <text x="40" y="332" font-family="sans-serif" font-size="12" font-weight="500" fill="#038C3E" letter-spacing="1">01 — СТРАТЕГИЯ</text>
  <text x="40" y="354" font-family="sans-serif" font-size="12" font-weight="400" fill="#666666">Визуальная система бренда</text>

  <text x="40" y="392" font-family="sans-serif" font-size="12" font-weight="500" fill="#038C3E" letter-spacing="1">02 — AI-ДИЗАЙН</text>
  <text x="40" y="414" font-family="sans-serif" font-size="12" font-weight="400" fill="#666666">Генеративные инструменты в работе</text>

  <text x="40" y="452" font-family="sans-serif" font-size="12" font-weight="500" fill="#038C3E" letter-spacing="1">03 — СМЫСЛ</text>
  <text x="40" y="474" font-family="sans-serif" font-size="12" font-weight="400" fill="#666666">Не просто красиво — работающе</text>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="680" height="70" fill="#038C3E" opacity="0.07"/>
  <line x1="0" y1="610" x2="680" y2="610" stroke="#038C3E" stroke-width="0.75"/>

  <!-- Logo -->
  <image href="LOGO_ZD_LOGO_ZD_Black.png" x="40" y="622" width="48" height="48" opacity="0.6" style="filter: invert(1)"/>

  <!-- Handle / name -->
  <text x="104" y="641" font-family="sans-serif" font-size="13" font-weight="500" fill="#ffffff">ZD Studio</text>
  <text x="104" y="659" font-family="sans-serif" font-size="11" font-weight="400" fill="#555555" letter-spacing="0.5">@zd.studio</text>

  <!-- CTA -->
  <text x="640" y="641" text-anchor="end" font-family="sans-serif" font-size="11" font-weight="400" fill="#555555" letter-spacing="0.5">Первый пост.</text>
  <text x="640" y="659" text-anchor="end" font-family="sans-serif" font-size="11" font-weight="500" fill="#038C3E" letter-spacing="0.5">Начало системы ↓</text>

  <!-- Decorative dots -->
  <circle cx="610" cy="50" r="1.5" fill="#038C3E" opacity="0.4"/>
  <circle cx="630" cy="50" r="1.5" fill="#038C3E" opacity="0.4"/>
  <circle cx="650" cy="50" r="1.5" fill="#038C3E" opacity="0.4"/>
  <circle cx="610" cy="70" r="1.5" fill="#038C3E" opacity="0.4"/>
  <circle cx="630" cy="70" r="1.5" fill="#038C3E" opacity="0.4"/>
  <circle cx="650" cy="70" r="1.5" fill="#038C3E" opacity="0.4"/>
  <circle cx="610" cy="90" r="1.5" fill="#038C3E" opacity="0.4"/>
  <circle cx="630" cy="90" r="1.5" fill="#038C3E" opacity="0.4"/>
  <circle cx="650" cy="90" r="1.5" fill="#038C3E" opacity="0.4"/>
</svg>
